name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get Version
        id: get_version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Bearpad 2 v${{ steps.get_version.outputs.version }}
          draft: true
          prerelease: false
          generate_release_notes: true

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install dependencies
        run: npm ci || npm install
        shell: pwsh

      - name: Build Windows installer
        run: npm run tauri build
        shell: pwsh
        env:
          # Disable updater signing (no private key in secrets yet)
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: List build outputs
        run: |
          $files = Get-ChildItem -Recurse src-tauri/target/release/bundle -File
          $files | Select-Object FullName, Length
        shell: pwsh

      - name: Upload Windows Artifacts
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ needs.create-release.outputs.version }}"
          Write-Host "=== Bundles ==="
          Get-ChildItem -Recurse src-tauri/target/release/bundle -File | ForEach-Object {
            Write-Host $_.FullName
          }
          # Upload MSI
          Get-ChildItem -Recurse src-tauri/target/release/bundle/msi -Filter "*.msi" | ForEach-Object {
            $name = "Bearpad-2_${version}_$($_.Name)"
            Write-Host "Uploading $name"
            gh release upload "v$version" $_.FullName --clobber --repo $env:GITHUB_REPOSITORY
          }
          # Upload NSIS .exe
          Get-ChildItem -Recurse src-tauri/target/release/bundle/nsis -Filter "*.exe" | ForEach-Object {
            $name = "Bearpad-2_${version}_$($_.Name)"
            Write-Host "Uploading $name"
            gh release upload "v$version" $_.FullName --clobber --repo $env:GITHUB_REPOSITORY
          }

  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build macOS (universal)
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Upload macOS Artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.create-release.outputs.version }}"
          find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" -exec gh release upload "v$version" {} --clobber \;
          find src-tauri/target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -name "*.app" -type d
